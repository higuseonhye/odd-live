services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      - AGENTOS_SECRET_KEY=${AGENTOS_SECRET_KEY:-dev}
      - AGENTOS_POLICY_PATH=/app/policies/default.yaml
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - agentos_runs:/app/runs
      - agentos_reports:/app/reports
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  agentos_runs:
  agentos_reports:
