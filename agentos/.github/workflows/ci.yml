name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install AgentOS
        run: pip install -e ".[dev]"
      - name: Install SDK (tests)
        run: pip install -e "./agentos-sdk[dev]"
      - name: Pytest
        run: python -m pytest tests agentos-sdk/tests -v

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install & build
        working-directory: dashboard
        run: npm ci && npm run build && npm run lint
