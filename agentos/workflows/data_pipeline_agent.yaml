# Multi-step ETL — failure often surfaces at transform.
name: data_pipeline
steps:
  - id: extract
    agent: data-pipeline
    agent_tags: ["etl", "data"]
    risk_level: low
    input: "Extract raw rows from source connector"
    requires_approval: false

  - id: transform
    agent: data-pipeline
    agent_tags: ["etl", "data"]
    risk_level: medium
    input: "Apply schema mapping and deduplication"
    requires_approval: false

  - id: load
    agent: data-pipeline
    agent_tags: ["etl", "data"]
    risk_level: medium
    input: "Load into warehouse staging table"
    requires_approval: false
